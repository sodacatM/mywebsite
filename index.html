<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>帅哥展示页</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #071133, #020617 70%);
      overflow: hidden;
      font-family: "Microsoft YaHei", sans-serif;
      color: white;
    }

    .container {
      position: relative;
      width: 760px;
      height: 760px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .center-video {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #38bdf8;
      box-shadow: 0 0 30px rgba(56,189,248,0.8), 0 0 80px rgba(56,189,248,0.35);
      z-index: 5;
      background: #000;
    }

    .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
    }

    .ring-1 {
      width: 430px;
      height: 430px;
      animation: spin1 10s linear infinite;
    }

    .ring-2 {
      width: 560px;
      height: 560px;
      animation: spin2 14s linear infinite;
    }

    .ring-3 {
      width: 690px;
      height: 690px;
      animation: spin3 18s linear infinite;
    }

    .ring span {
      position: absolute;
      left: 50%;
      top: 50%;
      color: #38bdf8;
      text-shadow: 0 0 8px rgba(56,189,248,0.9), 0 0 20px rgba(56,189,248,0.6);
      white-space: pre;
      font-weight: 600;
    }

    .ring-1 span {
      font-size: 22px;
      transform-origin: 0 150px;
    }

    .ring-2 span {
      font-size: 21px;
      transform-origin: 0 210px;
    }

    .ring-3 span {
      font-size: 20px;
      transform-origin: 0 275px;
    }

    @keyframes spin1 {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes spin2 {
      from { transform: translate(-50%, -50%) rotate(360deg); }
      to { transform: translate(-50%, -50%) rotate(0deg); }
    }

    @keyframes spin3 {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .hint {
      position: absolute;
      bottom: 26px;
      width: 100%;
      text-align: center;
      color: #c7d2fe;
      font-size: 18px;
      letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(56,189,248,0.45);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="ring ring-3" id="ring3"></div>
    <div class="ring ring-2" id="ring2"></div>
    <div class="ring ring-1" id="ring1"></div>

    <video class="center-video" controls autoplay loop playsinline>
      <source src="mb.mp4" type="video/mp4">
      你的浏览器不支持视频播放
    </video>

    <div class="hint">请点击马博（点击视频开启声音）</div>
  </div>

  <script>
    function fillRing(id, content) {
      const ring = document.getElementById(id);
      const len = content.length;
      for (let i = 0; i < len; i++) {
        const span = document.createElement('span');
        span.innerText = content[i];
        span.style.transform = `rotate(${i * (360 / len)}deg)`;
        ring.appendChild(span);
      }
    }

    fillRing('ring1', '马博太帅了 马博无敌帅气 马博颜值爆表 马博真的太帅了 帅帅帅帅帅 ');
    fillRing('ring2', '马博宇宙第一帅 马博绝世帅哥 马博气质无敌 马博越看越帅 马博魅力拉满 马博帅得离谱 ');
    fillRing('ring3', '马博就是最帅的 马博全场焦点 马博天生主角脸 马博光芒四射 马博真的好帅 马博帅到发光 ');
  </script>
</body>
</html>
