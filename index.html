<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>帅哥展示页</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #0f172a, #020617);
      overflow: hidden;
      font-family: "Microsoft YaHei";
      color: white;
    }

    .container {
      position: relative;
      width: 420px;
      height: 420px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .center-video {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #38bdf8;
      box-shadow: 0 0 30px rgba(56,189,248,0.8);
      z-index: 2;
      background: #000;
    }

    .text {
      position: absolute;
      width: 100%;
      height: 100%;
      animation: rotate 10s linear infinite;
    }

    .text span {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 0 190px;
      font-size: 18px;
      color: #38bdf8;
      text-shadow: 0 0 10px rgba(56,189,248,0.8);
      white-space: pre;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .hint {
      position: absolute;
      bottom: -60px;
      width: 100%;
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- 中间视频：去掉 muted，加入 controls；若浏览器不允许带声音自动播放，用户点一下即可出声 -->
    <video class="center-video" controls autoplay loop playsinline>
      <source src="mb.mp4" type="video/mp4">
      你的浏览器不支持视频播放
    </video>

    <!-- 环绕文字 -->
    <div class="text" id="text"></div>

    <div class="hint">如未自动出声，请点击视频或使用控制条开启声音</div>

  </div>

  <script>
    const content = "帅哥太帅了 无敌帅气 颜值爆表 太离谱了 真的帅 ";
    const textContainer = document.getElementById("text");

    for (let i = 0; i < content.length; i++) {
      const span = document.createElement("span");
      span.innerText = content[i];
      span.style.transform = `rotate(${i * (360 / content.length)}deg)`;
      textContainer.appendChild(span);
    }
  </script>
</body>
</html>
