<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>如何正确使用AED - 大学生安全教育平台</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;min-height:100vh;background:linear-gradient(135deg,#eb8b69 0%,#e78361 48%,#e17758 100%);padding:32px 20px 40px;color:#1f2937}
    a{text-decoration:none;color:inherit}
    .shell{width:min(1200px,94vw);margin:0 auto}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:26px}
    .badge{display:inline-flex;align-items:center;gap:10px;padding:10px 16px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;font-size:13px;margin-bottom:14px;backdrop-filter:blur(8px)}
    .badge::before{content:"";width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 12px rgba(255,255,255,.75)}
    h1{font-size:clamp(32px,4.8vw,56px);line-height:1.08;margin-bottom:10px;color:#fff;font-weight:900}
    .desc{max-width:760px;line-height:1.9;color:rgba(255,255,255,.92);font-size:16px}
    .actions{display:flex;gap:12px;flex-wrap:wrap}.btn{padding:12px 18px;border-radius:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;backdrop-filter:blur(8px)}
    .panel{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:30px;padding:26px;backdrop-filter:blur(10px);box-shadow:0 24px 55px rgba(103,31,14,.12)}
    .video-box{height:min(62vh,620px);border-radius:24px;background:rgba(255,255,255,.94);position:relative;overflow:hidden;box-shadow:0 18px 36px rgba(61,24,15,.10);margin-bottom:22px}
    .video-box::before{content:"视频播放器区域占位";position:absolute;inset:20px;border-radius:20px;border:2px dashed rgba(225,119,88,.45);display:flex;align-items:center;justify-content:center;color:#d47553;font-size:18px;letter-spacing:1px}
    .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:86px;height:86px;border-radius:50%;background:linear-gradient(135deg,#eb8b69,#e17758);display:flex;align-items:center;justify-content:center;color:#fff;font-size:34px;box-shadow:0 18px 35px rgba(106,42,24,.18)}
    .info{background:rgba(255,255,255,.92);border-radius:24px;padding:24px;box-shadow:0 18px 36px rgba(61,24,15,.10)}
    .info h2{font-size:28px;color:#0f172a;margin-bottom:14px}
    .meta{display:inline-flex;align-items:center;gap:10px;padding:10px 14px;border-radius:999px;background:rgba(235,139,105,.10);color:#dd7650;font-weight:700;font-size:13px;margin-bottom:16px}
    .info p{font-size:15px;line-height:2;color:#64748b}
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div>
        <div class="badge">视频详情页 · A</div>
        <h1>如何正确使用 AED</h1>
        <p class="desc">该页面以视频为主展示，顶部保留播放器区域，底部提供对应的介绍说明文字，适合后续嵌入视频链接或本地视频资源。</p>
      </div>
      <div class="actions">
        <a class="btn" href="video-list.html">返回视频列表</a>
        <a class="btn" href="index.html">返回首页</a>
      </div>
    </div>

    <div class="panel">
      <div class="video-box"><div class="play">▶</div></div>
      <div class="info">
        <div class="meta">安全急救科普</div>
        <h2>内容简介</h2>
        <p>AED 自动体外除颤器是一种便携式急救设备，能够自动分析患者的心律，并在必要时进行电击除颤，以挽救心脏骤停患者的生命。后续你可以在本页面的视频区域嵌入正式视频，在下方继续补充使用步骤、适用场景与注意事项等内容。</p>
      </div>
    </div>
  </div>
</body>
</html>
